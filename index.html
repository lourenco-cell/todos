<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="To-dos"/>
<meta name="theme-color" content="#ffffff"/>
<title>To-dos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;padding-bottom:80px;}
  .header{background:#fff;padding:20px 16px 12px;border-bottom:0.5px solid #e0e0e0;position:sticky;top:0;z-index:10;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .header-name{font-size:20px;font-weight:600;}
  .header-date{font-size:13px;color:#888;margin-top:2px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#1d4ed8;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}
  .stat-card{background:#fff;border-radius:12px;padding:12px 14px;border:0.5px solid #e8e8e8;}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px;}
  .stat-value{font-size:24px;font-weight:600;color:#1a1a1a;}
  .tabs{display:flex;background:#fff;border-bottom:0.5px solid #e0e0e0;padding:0 16px;}
  .tab{flex:1;padding:11px 0;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;}
  .tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;}
  .list-container{padding:0 16px;margin-top:4px;}
  .section-title{font-size:11px;font-weight:600;color:#888;letter-spacing:0.06em;text-transform:uppercase;padding:14px 0 6px;display:flex;align-items:center;gap:5px;}
  .section-card{background:#fff;margin:0 -16px;border-top:0.5px solid #f0f0f0;border-bottom:0.5px solid #f0f0f0;}
  .day-header{display:flex;align-items:center;gap:8px;padding:12px 16px 6px;background:#fafafa;border-bottom:0.5px solid #f0f0f0;}
  .day-header.today{background:#eff6ff;}
  .day-name{font-size:13px;font-weight:700;color:#1a1a1a;}
  .day-name.today{color:#2563eb;}
  .day-count{font-size:11px;color:#aaa;}
  .task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:0.5px solid #f0f0f0;background:#fff;}
  .task-row.urgent{border-left:3px solid #ef4444;padding-left:13px;}
  .task-row:last-child{border-bottom:none;}
  .task-cb{width:20px;height:20px;min-width:20px;margin-top:2px;accent-color:#1a1a1a;cursor:pointer;}
  .task-info{flex:1;display:flex;flex-direction:column;gap:5px;}
  .task-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .task-text{font-size:14px;line-height:1.4;color:#1a1a1a;}
  .task-text.done{text-decoration:line-through;color:#bbb;}
  .urgent-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fef2f2;border:0.5px solid #fca5a5;color:#dc2626;font-weight:500;}
  .task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .urgent-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #ddd;color:#aaa;background:none;cursor:pointer;}
  .urgent-btn.on{border-color:#fca5a5;color:#dc2626;background:#fef2f2;}
  .day-pills{display:flex;gap:4px;flex-wrap:wrap;}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #1a1a1a;color:#1a1a1a;background:#fff;font-weight:500;}
  .pill.today{border-color:#2563eb;color:#2563eb;}
  .edit-days-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #ddd;color:#888;background:none;cursor:pointer;white-space:nowrap;}
  .task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .cal-btn{font-size:11px;padding:3px 8px;border-radius:8px;border:0.5px solid #2563eb;color:#2563eb;background:none;cursor:pointer;white-space:nowrap;}
  .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;padding:2px 4px;line-height:1;}
  .empty-msg{font-size:13px;color:#aaa;padding:12px 16px;}
  .show-others-btn{background:none;border:none;cursor:pointer;font-size:12px;color:#888;padding:10px 16px;display:flex;align-items:center;gap:4px;}
  .input-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0e0;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;z-index:20;}
  .task-input{flex:1;font-size:15px;padding:9px 12px;border-radius:10px;border:0.5px solid #ddd;background:#f8f8f8;outline:none;-webkit-appearance:none;}
  .task-input:focus{border-color:#1a1a1a;background:#fff;}
  .mic-btn{width:44px;height:44px;border-radius:50%;border:0.5px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .mic-btn.recording{background:#fef2f2;border-color:#ef4444;}
  .add-btn{width:44px;height:44px;border-radius:50%;border:0.5px solid #ddd;background:#1a1a1a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;z-index:100;display:none;white-space:nowrap;max-width:90vw;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none;align-items:flex-end;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;}
  .modal-title{font-size:15px;font-weight:600;margin-bottom:4px;}
  .modal-sub{font-size:13px;color:#888;margin-bottom:16px;}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-btn{padding:13px 0;font-size:14px;font-weight:500;border-radius:12px;border:0.5px solid #ddd;background:#f8f8f8;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .modal-btn:active{background:#efefef;}
  .modal-cancel{width:100%;margin-top:10px;font-size:13px;color:#888;background:none;border:none;cursor:pointer;padding:10px;}
  .day-selector{display:flex;gap:8px;justify-content:center;margin:16px 0;}
  .day-sel-pill{width:44px;height:44px;border-radius:50%;border:0.5px solid #ddd;background:#f8f8f8;color:#888;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .day-sel-pill.selected{background:#1a1a1a;border-color:#1a1a1a;color:#fff;}
  .modal-save{width:100%;padding:14px;font-size:15px;font-weight:500;border-radius:12px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-name">Olá, Lourenço 👋</div>
      <div class="header-date" id="date-label"></div>
    </div>
    <div class="avatar">L</div>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-label">Recorrentes hoje</div><div class="stat-value" id="rec-count">0/0</div></div>
  <div class="stat-card"><div class="stat-label">Pontuais</div><div class="stat-value" id="pon-count">0</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('prof')" id="tab-prof">Profissional</button>
  <button class="tab" onclick="switchTab('pes')" id="tab-pes">Pessoal</button>
</div>

<div class="list-container" id="main-list"></div>

<div class="input-bar">
  <input class="task-input" id="task-input" type="text" placeholder="Nova tarefa..."/>
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Microfone">🎙️</button>
  <button class="add-btn" onclick="openAddModal()" aria-label="Adicionar">+</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-type">
  <div class="modal">
    <div class="modal-title" id="modal-type-name"></div>
    <div class="modal-sub">Que tipo de tarefa é esta?</div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="chooseType('rec')">🔁 Recorrente</button>
      <button class="modal-btn" onclick="chooseType('pon')">⚡ Pontual</button>
    </div>
    <button class="modal-cancel" onclick="closeAllModals()">Cancelar</button>
  </div>
</div>

<div class="modal-bg" id="modal-days">
  <div class="modal">
    <div class="modal-title" id="modal-days-name"></div>
    <div class="modal-sub">Escolhe os dias da semana</div>
    <div class="day-selector" id="day-selector"></div>
    <button class="modal-save" onclick="confirmDays()">Guardar</button>
    <button class="modal-cancel" onclick="closeAllModals()">Cancelar</button>
  </div>
</div>

<script>
const DAYS=['Seg','Ter','Qua','Qui','Sex'];
const TODAY_IDX=(new Date().getDay()+6)%7;
const todayName=DAYS[TODAY_IDX]||'';
const STORAGE_KEY='lourenco_tasks_v3';

function defaultData(){
  return {
    rec:[
      {text:"Confirmar fechos de caixa das lojas",days:['Seg'],done:false},
      {text:"Rever reviews do Google",days:['Ter'],done:false},
      {text:"Visitar Alvalade",days:['Qua'],done:false},
      {text:"Enviar relatórios de sobras",days:['Sex'],done:false},
    ],
    pon:[
      {text:"Tratar de manutenção dos restaurantes",urgent:false},
      {text:"Rever horário de Alvalade para o fim de semana",urgent:false},
      {text:"Renovar dístico da Renault Traffic",urgent:false},
    ],
    pes:[
      {text:"Treino para o triathlon",done:false},
      {text:"Sessão de surf",done:false},
      {text:"Tempo em família",done:false},
      {text:"Planear próxima viagem",done:false},
      {text:"Gestão de finanças com a minha mulher",done:false},
    ],
    lastReset:new Date().toDateString()
  };
}

function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return defaultData();}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(appData));}catch(e){}}

let appData=loadData();
if(appData.lastReset!==new Date().toDateString()){
  appData.rec.forEach(t=>t.done=false);
  appData.lastReset=new Date().toDateString();
  saveData();
}

let currentTab='prof',pendingText='',pendingEditIdx=-1,tempDays=[],recognition=null,isRecording=false;

document.getElementById('date-label').textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
function addToCalendar(text){const d=new Date(),pad=n=>String(n).padStart(2,'0');const ds=d.getFullYear()+''+pad(d.getMonth()+1)+''+pad(d.getDate());window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(text)+'&dates='+ds+'/'+ds,'_blank');}
function closeAllModals(){document.getElementById('modal-type').classList.remove('open');document.getElementById('modal-days').classList.remove('open');}
function updateCounts(){const tr=appData.rec.filter(t=>t.days.includes(todayName));document.getElementById('rec-count').textContent=tr.filter(t=>t.done).length+'/'+tr.length;document.getElementById('pon-count').textContent=appData.pon.length;}

function openDaysModal(text,days,idx){
  pendingEditIdx=idx;tempDays=[...days];
  document.getElementById('modal-days-name').textContent='"'+text+'"';
  const sel=document.getElementById('day-selector');sel.innerHTML='';
  DAYS.forEach(d=>{
    const btn=document.createElement('button');btn.className='day-sel-pill'+(tempDays.includes(d)?' selected':'');btn.textContent=d;
    btn.onclick=()=>{if(tempDays.includes(d))tempDays=tempDays.filter(x=>x!==d);else tempDays.push(d);btn.className='day-sel-pill'+(tempDays.includes(d)?' selected':'');};
    sel.appendChild(btn);
  });
  closeAllModals();document.getElementById('modal-days').classList.add('open');
}

function confirmDays(){
  if(!tempDays.length){showToast('Escolhe pelo menos um dia.');return;}
  if(pendingEditIdx===-1){appData.rec.push({text:pendingText,days:[...tempDays],done:false});document.getElementById('task-input').value='';showToast('✓ Recorrente adicionada!');}
  else{appData.rec[pendingEditIdx].days=[...tempDays];showToast('✓ Dias atualizados!');}
  saveData();closeAllModals();renderProf();
}

function buildRecRow(task,idx){
  const row=document.createElement('div');row.className='task-row';
  const cb=document.createElement('input');cb.type='checkbox';cb.className='task-cb';cb.checked=task.done;
  cb.onchange=()=>{appData.rec[idx].done=cb.checked;saveData();renderProf();};
  const label=document.createElement('span');label.className='task-text'+(task.done?' done':'');label.style.flex='1';label.textContent=task.text;
  const editBtn=document.createElement('button');editBtn.className='edit-days-btn';editBtn.textContent='✎';editBtn.title='Editar dias';
  editBtn.onclick=()=>openDaysModal(task.text,task.days,idx);
  const del=document.createElement('button');del.className='del-btn';del.textContent='×';del.onclick=()=>{appData.rec.splice(idx,1);saveData();renderProf();};
  const actions=document.createElement('div');actions.className='task-actions';
  actions.appendChild(editBtn);actions.appendChild(del);
  row.appendChild(cb);row.appendChild(label);row.appendChild(actions);return row;
}

function buildPonRow(task,i){
  const row=document.createElement('div');row.className='task-row'+(task.urgent?' urgent':'');
  const cb=document.createElement('input');cb.type='checkbox';cb.className='task-cb';cb.checked=false;
  cb.onchange=()=>setTimeout(()=>{appData.pon.splice(i,1);saveData();renderProf();showToast('✓ Tarefa concluída!');},350);
  const info=document.createElement('div');info.className='task-info';
  const top=document.createElement('div');top.className='task-top';
  const label=document.createElement('span');label.className='task-text';label.textContent=task.text;
  top.appendChild(label);
  if(task.urgent){const b=document.createElement('span');b.className='urgent-badge';b.textContent='🔴 Urgente';top.appendChild(b);}
  info.appendChild(top);
  const meta=document.createElement('div');meta.className='task-meta';
  const ub=document.createElement('button');ub.className='urgent-btn'+(task.urgent?' on':'');
  ub.textContent=task.urgent?'● Urgente':'○ Marcar urgente';
  ub.onclick=()=>{appData.pon[i].urgent=!appData.pon[i].urgent;saveData();renderProf();};
  meta.appendChild(ub);info.appendChild(meta);
  const actions=document.createElement('div');actions.className='task-actions';
  const cal=document.createElement('button');cal.className='cal-btn';cal.textContent='📅 Cal';cal.onclick=()=>addToCalendar(task.text);
  const del=document.createElement('button');del.className='del-btn';del.textContent='×';del.onclick=()=>{appData.pon.splice(i,1);saveData();renderProf();};
  actions.appendChild(cal);actions.appendChild(del);
  row.appendChild(cb);row.appendChild(info);row.appendChild(actions);return row;
}

function renderProf(){
  const el=document.getElementById('main-list');el.innerHTML='';
  const st1=document.createElement('div');st1.className='section-title';st1.textContent='🔁  Recorrentes';el.appendChild(st1);
  const c1=document.createElement('div');c1.className='section-card';

  const dayFull={'Seg':'Segunda-feira','Ter':'Terça-feira','Qua':'Quarta-feira','Qui':'Quinta-feira','Sex':'Sexta-feira'};
  // Order: today first, then the rest of the week in order
  const order=[...DAYS];
  if(todayName){
    order.sort((a,b)=>{
      if(a===todayName)return -1;
      if(b===todayName)return 1;
      return DAYS.indexOf(a)-DAYS.indexOf(b);
    });
  }

  let anyTask=false;
  order.forEach(day=>{
    const tasksForDay=appData.rec.filter(t=>t.days.includes(day));
    if(!tasksForDay.length)return;
    anyTask=true;
    const isToday=day===todayName;
    const header=document.createElement('div');header.className='day-header'+(isToday?' today':'');
    const name=document.createElement('span');name.className='day-name'+(isToday?' today':'');
    name.textContent=dayFull[day]+(isToday?' · Hoje':'');
    const count=document.createElement('span');count.className='day-count';
    const doneCount=tasksForDay.filter(t=>t.done).length;
    count.textContent=doneCount+'/'+tasksForDay.length;
    header.appendChild(name);header.appendChild(count);
    c1.appendChild(header);
    tasksForDay.forEach(t=>c1.appendChild(buildRecRow(t,appData.rec.indexOf(t))));
  });

  if(!anyTask){
    const m=document.createElement('p');m.className='empty-msg';m.textContent='Sem tarefas recorrentes.';c1.appendChild(m);
  }
  el.appendChild(c1);

  const st2=document.createElement('div');st2.className='section-title';st2.style.marginTop='8px';st2.textContent='⚡  Pontuais';el.appendChild(st2);
  const c2=document.createElement('div');c2.className='section-card';
  const sorted=[...appData.pon.filter(t=>t.urgent),...appData.pon.filter(t=>!t.urgent)];
  if(!sorted.length){const e=document.createElement('p');e.className='empty-msg';e.textContent='Sem tarefas pontuais.';c2.appendChild(e);}
  sorted.forEach(t=>c2.appendChild(buildPonRow(t,appData.pon.indexOf(t))));
  el.appendChild(c2);updateCounts();
}

function renderPes(){
  const el=document.getElementById('main-list');el.innerHTML='';
  const c=document.createElement('div');c.className='section-card';c.style.marginTop='10px';
  appData.pes.forEach((task,i)=>{
    const row=document.createElement('div');row.className='task-row';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='task-cb';cb.checked=task.done;
    cb.onchange=()=>{appData.pes[i].done=cb.checked;saveData();renderPes();};
    const label=document.createElement('span');label.className='task-text'+(task.done?' done':'');label.style.flex='1';label.textContent=task.text;
    const cal=document.createElement('button');cal.className='cal-btn';cal.textContent='📅 Cal';cal.onclick=()=>addToCalendar(task.text);
    const del=document.createElement('button');del.className='del-btn';del.textContent='×';del.onclick=()=>{appData.pes.splice(i,1);saveData();renderPes();};
    const actions=document.createElement('div');actions.className='task-actions';actions.appendChild(cal);actions.appendChild(del);
    row.appendChild(cb);row.appendChild(label);row.appendChild(actions);c.appendChild(row);
  });
  el.appendChild(c);updateCounts();
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-prof').className='tab'+(tab==='prof'?' active':'');
  document.getElementById('tab-pes').className='tab'+(tab==='pes'?' active':'');
  tab==='prof'?renderProf():renderPes();
}

function openAddModal(){
  const text=document.getElementById('task-input').value.trim();
  if(!text){showToast('Escreve ou dita uma tarefa primeiro.');return;}
  pendingText=text;
  if(currentTab==='pes'){appData.pes.push({text:pendingText,done:false});document.getElementById('task-input').value='';saveData();renderPes();showToast('✓ Tarefa adicionada!');return;}
  document.getElementById('modal-type-name').textContent='"'+text+'"';
  document.getElementById('modal-type').classList.add('open');
}

function chooseType(type){
  if(type==='pon'){appData.pon.push({text:pendingText,urgent:false});document.getElementById('task-input').value='';saveData();closeAllModals();renderProf();showToast('✓ Pontual adicionada!');}
  else{pendingEditIdx=-1;openDaysModal(pendingText,[],- 1);}
}

[document.getElementById('modal-type'),document.getElementById('modal-days')].forEach(m=>{
  m.addEventListener('click',function(e){if(e.target===this)closeAllModals();});
});

function parseDate(text){
  const t=text.toLowerCase();const now=new Date();let date=new Date(now);let hour=9,min=0;
  if(t.includes('amanhã')||t.includes('amanha'))date.setDate(now.getDate()+1);
  else if(t.includes('depois de amanhã')||t.includes('depois de amanha'))date.setDate(now.getDate()+2);
  else{
    const days=['segunda','terça','terca','quarta','quinta','sexta'];
    const dmap=[1,2,2,3,4,5];
    for(let i=0;i<days.length;i++){if(t.includes(days[i])){const cur=now.getDay();let diff=dmap[i]-cur;if(diff<=0)diff+=7;date.setDate(now.getDate()+diff);break;}}
  }
  const tm=t.match(/(\d{1,2})(?:[:.]\d{2})?\s*h/);if(tm)hour=parseInt(tm[1]);
  date.setHours(hour,min,0,0);return date;
}

function handleMeeting(text){
  const d=parseDate(text);const pad=n=>String(n).padStart(2,'0');
  const fmt=dt=>dt.getFullYear()+''+pad(dt.getMonth()+1)+''+pad(dt.getDate())+'T'+pad(dt.getHours())+''+pad(dt.getMinutes())+'00';
  const end=new Date(d.getTime()+3600000);
  const title=text.replace(/reunião|reuniao/gi,'').replace(/amanhã|amanha|segunda|terça|terca|quarta|quinta|sexta/gi,'').replace(/\d{1,2}(?:[:.]\d{2})?\s*h(?:oras)?/gi,'').replace(/\s+/g,' ').trim();
  showToast('📅 A abrir calendário...');
  setTimeout(()=>window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('Reunião '+(title||''))+'&dates='+fmt(d)+'/'+fmt(end),'_blank'),600);
}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){showToast('Microfone não suportado neste browser.');return;}
  if(isRecording){recognition&&recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='pt-PT';recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;document.getElementById('mic-btn').className='mic-btn recording';};
  recognition.onresult=(e)=>{
    const t=e.results[0][0].transcript;
    if(t.toLowerCase().includes('reunião')||t.toLowerCase().includes('reuniao')){handleMeeting(t);}
    else{document.getElementById('task-input').value=t;pendingText=t;setTimeout(()=>openAddModal(),300);}
  };
  recognition.onend=()=>{isRecording=false;document.getElementById('mic-btn').className='mic-btn';};
  recognition.onerror=()=>{isRecording=false;document.getElementById('mic-btn').className='mic-btn';showToast('Não foi possível captar áudio.');};
  recognition.start();
}

document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')openAddModal();});
renderProf();
</script>
</body>
</html>
